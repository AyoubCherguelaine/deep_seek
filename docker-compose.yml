services:
  unlimited-ocr-api:
    build:
      context: .
      dockerfile: Dockerfile

    image: unlimited-ocr-api:latest

    container_name: unlimited-ocr-api

    restart: unless-stopped

    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility

    volumes:
      - huggingface-cache:/root/.cache/huggingface
      - unlimited-temp:/tmp/unlimited_ocr

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  huggingface-cache:
  unlimited-temp:
